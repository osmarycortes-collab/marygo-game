<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<title>JUEGA CON MARY GO</title>

<link rel="stylesheet" href="./styles.css">
<script src="./js/mokepon.js" defer></script>

</head>

<body>

<section id="seleccionar-mascota">

<h1 class="titulo">JUEGA CON LOS SUPER MARYGO</h1>
<h2 class="subtitulo">ELIGE TU MASCOTA</h2>

<div class="tarjetas">

<label class="tarjeta-de-mokepon" for="Marydoge">
<p>Marydoge</p>
<img src="./mascotas/Marydoge.png">
</label>
<input type="radio" name="mascotas" id="Marydoge">

<label class="tarjeta-de-mokepon" for="Marypepo">
<p>Marypepo</p>
<img src="./mascotas/Marypepo.png">
</label>
<input type="radio" name="mascotas" id="Marypepo">

<label class="tarjeta-de-mokepon" for="Marygueya">
<p>Marygueya</p>
<img src="./mascotas/Marygueya.png">
</label>
<input type="radio" name="mascotas" id="Marygueya">

</div>

<button id="boton-mascota">Seleccionar</button>

</section>


<section id="seleccionar-ataque">

<h1 class="titulo">JUEGA CON LOS SUPER MARYGO</h1>
<h2 class="subtitulo">ELIGE TU ATAQUE</h2>

<div>

<button id="boton-fuego" class="boton-de-ataque">Fuego 🔥</button>
<button id="boton-agua" class="boton-de-ataque">Agua 💧</button>
<button id="boton-tierra" class="boton-de-ataque">Tierra 🌱</button>

</div>

<button id="boton-regresar">Cambiar mascota</button>

<section id="mensajes"></section>

<div id="zona-combate">

<div class="arena">

<div class="jugador">

<img id="img-jugador" width="120">
<div id="vidas-jugador"></div>

</div>

<div class="vs">VS</div>

<div class="oponente">

<img id="img-oponente" width="120">
<div id="vidas-oponente"></div>

</div>

</div>

</div>

<section id="reiniciar">

<button id="boton-reiniciar">Reiniciar</button>

</section>

</section>

</body>
</html>
